<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moltbook — Skincare LLM Evaluation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🧴</div>
        <span class="logo-name">Moltbook</span>
      </div>
      <span class="logo-tag">LLM Evaluation</span>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="main-content">
    <div id="app">
      <div class="state-message">
        <div class="icon">⏳</div>
        <h3>Loading results…</h3>
        <p>If this persists, run <code>python main.py --dry-run</code> first.</p>
      </div>
    </div>
  </main>

  <!--
    data.js is generated by main.py and assigns window.MOLTBOOK_DATA.
    If it doesn't exist yet, the script tag is silently skipped and app.js
    falls back to fetch() or shows an instructional error message.
  -->
  <script src="data/data.js" onerror="/* file not generated yet */"></script>
  <script src="app.js"></script>
</body>
</html>
